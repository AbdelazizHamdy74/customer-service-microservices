<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set Password - CSM</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        margin: 40px auto;
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: #4a4a4a;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 600;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d7dbe3;
        border-radius: 8px;
        font-size: 14px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px 12px;
        background: #1f6feb;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .message {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 14px;
      }
      .message.success {
        background: #e8f6ee;
        color: #136f3a;
      }
      .message.error {
        background: #fdeaea;
        color: #b42318;
      }
      .token-note {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Set your password</h1>
      <p>Enter a new password to activate your account.</p>

      <form id="setPasswordForm">
        <label for="password">New Password</label>
        <input id="password" type="password" minlength="8" required />

        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" minlength="8" required />

        <button id="submitBtn" type="submit">Set Password</button>
      </form>

      <div id="message" class="message" style="display: none"></div>
      <div id="tokenNote" class="token-note" style="display: none"></div>
    </div>

    <script>
      const form = document.getElementById("setPasswordForm");
      const message = document.getElementById("message");
      const tokenNote = document.getElementById("tokenNote");
      const submitBtn = document.getElementById("submitBtn");

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (token) {
        tokenNote.style.display = "block";
        tokenNote.textContent = `Invite token: ${token}`;
      }

      const showMessage = (text, type) => {
        message.textContent = text;
        message.className = `message ${type}`;
        message.style.display = "block";
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.style.display = "none";

        if (!token) {
          showMessage("Invite token is missing from the URL.", "error");
          return;
        }

        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (password.length < 8) {
          showMessage("Password must be at least 8 characters.", "error");
          return;
        }
        if (password !== confirmPassword) {
          showMessage("Passwords do not match.", "error");
          return;
        }

        submitBtn.disabled = true;
        try {
          const response = await fetch("/api/v1/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token,
              newPassword: password,
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || "Failed to set password");
          }

          showMessage(
            "Password set successfully. You can now log in.",
            "success",
          );
          form.reset();
        } catch (error) {
          showMessage(error.message, "error");
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
